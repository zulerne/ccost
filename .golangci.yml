version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    # Default linters
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    # Additional verified linters
    - revive
    - gosec
    - gocritic
    - prealloc
    - unconvert
    # Error handling
    - wrapcheck
    - errorlint
  settings:
    govet:
      enable:
        - shadow
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - goconst
          - gosec
          - gocritic
          - wrapcheck
